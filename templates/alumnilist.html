<!DOCTYPE html>
<html>
<head>
    <title>Alumni List</title>
</head>
<body>
    <h1>Alumni List</h1>
    <form method="GET" action="/alumnilist">
    <label for="program">Degree Type</label>
    <select name="program" id="program">
    <option value="">Select Degree</option>
      <option value = "MS">MS</option>
      <option value = "PhD">PhD</option>
    </select>
    <label for = "grad_year">Graduation Year</label>
    <input type="text" name="grad_year" placeholder = "Graduation Year">
    <label for="grad_semester">Semester Graduated</label>
    <select name="grad_semester" id="grad_semester">
    <option value="">Select Semester</option>
      <option value = "Fall">Fall</option>
      <option value = "Spring">Spring</option>
    </select>
    <input type="submit" value="Search">
  </form>
    <table border="1" cellpadding="6">
    <thead>
      <tr>
        <th>UID</th>
        <th>Name</th>
        <th>Program</th>
        <th>Graduation Year</th>
        <th>Graduation Semester</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody>
      {% for row in alum %}
      <tr>
        <td>{{ row.uid }}</td>
        <td>{{ row.fname }} {{ row.lname }}</td>
        <td>{{ row.degree }}</td>
        <td>
          {{ row.graduation_year}}
        </td>
        <td>{{ row.graduation_semester }}</td>
        <td>{{ row.email }}</td>
      </tr>
      {% else %}
      <tr><td colspan="6">No students match.</td></tr>
      {% endfor %}
    </tbody>
  </table>
    <p><a href="/logout">Logout</a></p>
    <p><a href="/secretary">Dashboard</a></p>
</body>
</html>
